# H2 In-Memory Database for DEV_MODE Strict Testing
spring.datasource.url=jdbc:h2:mem:aerofisc_testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate Configuration for Mock DB
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Enable H2 Console for local debugging if needed
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Mock external services API endpoints to loopback to local mock servers
gemini.api.url=http://localhost:9999/api/mock/gemini
alphavantage.api.url=http://localhost:9999/api/mock/alpha
