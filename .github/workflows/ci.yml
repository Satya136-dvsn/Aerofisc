name: Aerofisc Strict Testing Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend-tests:
    name: Backend Tests (JaCoCo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - name: Run Backend Unit & Integration Tests
        run: mvn -B clean test jacoco:report --file backend/pom.xml
        env:
          DEV_MODE: "true"
          USE_REAL_DB: "false"

  frontend-tests:
    name: Frontend Component Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Run Component Tests
        working-directory: ./frontend
        run: npm run test

  e2e-tests:
    name: Browser E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install chromium --with-deps
      - name: Set up JDK 21 (For Backend Dev Server)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - name: Run Playwright tests
        working-directory: ./frontend
        run: npx playwright test
        env:
          DEV_MODE: "true"
          USE_REAL_DB: "false"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 10

  load-tests:
    name: Load Tests (k6)
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Start Background Application
        run: |
          cd backend
          mvn spring-boot:run -Dspring-boot.run.profiles=dev &
          echo "Waiting for Spring Boot to become available on port 8080..."
          for i in {1..24}; do
            curl -s http://127.0.0.1:8080/health && break
            sleep 5
          done
        env:
          DEV_MODE: "true"
          USE_REAL_DB: "false"
      - name: Run k6 scenario
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6/load-test.js
